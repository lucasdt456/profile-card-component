<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./src/output.css">
  <title>Frontend Mentor | Profile card component</title>
</head>
<body class="bg-Blue-600 grid place-content-center h-screen
font-kumbh-sans overflow-hidden">

  <img 
  src="./assets/images/bg-pattern-top.svg" 
  alt="" aria-hidden="true"
  class="absolute top-[-250px] left-[-250px] 
  w-[622px] sm:w-[978px]
  sm:top-[-500px] sm:left-[-200px]">

  <img 
  src="./assets/images/bg-pattern-bottom.svg" 
  alt="" aria-hidden="true"
  class="absolute bottom-[-200px] right-[-250px]
  w-[622px] sm:w-[978px]
  sm:bottom-[-550px] sm:right-[-200px]">

  <main class="">
    <div class="grid place-content-center sm:w-[350px] w-[326px] bg-white
    rounded-[15px] overflow-hidden shadow-2xl text-center relative
    ">
      <img src="./assets/images/bg-pattern-card.svg" alt="" aria-hidden="true">
      <img src="./assets/images/image-victor.jpg" alt="image-Victor-Crest"
      class="rounded-full border-4 border-white absolute m-auto
      left-0 right-0 top-[76px]" aria-hidden="true">
      
      <div class="p-6 pt-[68px]">
        <h1>Victor Crest <span class="pl-1 font-normal text-gray-500">26</span></h1>
        <p class="mt-1 text-center text-gray-500">London</p>
      </div>
      
      <hr class="opacity-10 border-[1px] ">

      <div class="flex place-content-between py-4 px-11
      pb-6 ">
        <div>
          <h2>80K</h2>  
          <p class="text-[10px] tracking-[0.0938rem]">Followers</p>
        </div>

        <div>
          <h2>803K</h2>
          <p class="text-[10px] tracking-[0.0938rem]">Likes</p>
        </div>

        <div>
          <h2>1.4K</h2>
          <p class="text-[10px]  tracking-[0.0938rem]">Photos</p>
        </div>
      </div>

    </div>
  </main>
</body>
</html>
